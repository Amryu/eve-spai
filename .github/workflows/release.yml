name: Release

# Build release binaries and publish a GitHub Release when a v* tag is pushed.
# (Also runnable manually for testing.)
on:
  push:
    # main builds warm the cache on the default-branch scope, which (unlike a tag's
    # scope) is restorable by the tag-triggered release builds.
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create releases + upload assets

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ""
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # winit/egui need X11 + Wayland dev libs to link on Linux.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libwayland-dev libxcb1-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libx11-dev libxcursor-dev \
            libxi-dev libxrandr-dev libgl1-mesa-dev libdbus-1-dev pkg-config

      # Make the binary's reported version match the release tag (for the updater).
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          perl -0pi -e "s/(\[workspace\.package\][^\[]*?version = \")[^\"]*/\${1}$VERSION/s" Cargo.toml
          echo "Built version: $VERSION"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir dist
          cp "target/${{ matrix.target }}/release/eve-spai${{ matrix.ext }}" \
             "dist/eve-spai-${{ matrix.name }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v4
        with:
          name: eve-spai-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
