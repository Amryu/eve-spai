name: Release

# Build release binaries and publish a GitHub Release when a v* tag is pushed.
# (Also runnable manually for testing.)
on:
  push:
    tags: ["v*"]
  # Run manually (Actions tab) to re-warm the default-branch cache when needed — its
  # scope, unlike a tag's, is restorable by tag-triggered release builds.
  workflow_dispatch:

permissions:
  contents: write # create releases + upload assets

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ""
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # winit/egui need X11 + Wayland dev libs to link on Linux.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libwayland-dev libxcb1-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libx11-dev libxcursor-dev \
            libxi-dev libxrandr-dev libgl1-mesa-dev libdbus-1-dev pkg-config

      # The committed Cargo.toml version is the source of truth: a release tag must match it
      # exactly, so the published binary, the tag, and the source all agree. Reject the build on a
      # mismatch instead of silently rewriting it (a stale Cargo.toml then made local builds report
      # an old version and flag themselves "a version behind").
      - name: Verify Cargo.toml version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO=$(perl -0ne 'print $1 if /\[workspace\.package\][^\[]*?version = "([^"]+)"/s' Cargo.toml)
          if [ "$TAG" != "$CARGO" ]; then
            echo "::error::Tag v$TAG does not match Cargo.toml version $CARGO. Bump Cargo.toml to $TAG and commit before tagging."
            exit 1
          fi
          echo "Version $CARGO matches tag v$TAG."

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir dist
          cp "target/${{ matrix.target }}/release/eve-spai${{ matrix.ext }}" \
             "dist/eve-spai-${{ matrix.name }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v4
        with:
          name: eve-spai-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
