# EVE Spai battle-report — nginx location snippet.
#
# This is NOT a full server block. PASTE the blocks below INSIDE the existing
#   server { ... }  for eve-spai.com
# in /etc/nginx/sites-available/eve-spai.com (the nginx container's path; bind-mounted
# from the host at /srv/nginx/conf/sites-available/eve-spai.com).
#
# Placement: add the `location /api/br` and `location /br` blocks ALONGSIDE the
# existing `location / { ... }` that serves the static site. nginx matches the most
# specific prefix, so the static `/` keeps serving everything except these two paths.
# Put the `set_real_ip_from` / `real_ip_*` lines either here (inside the server block)
# or hoist them to the http{} level if you prefer them global — both work.
#
# After editing:  docker exec nginx nginx -t  &&  docker exec nginx nginx -s reload

# ---- Cloudflare real client IP ----------------------------------------------------
# Public traffic arrives Cloudflare edge -> cloudflared tunnel -> nginx, so nginx's
# direct peer is local (the cloudflared/docker side), NOT the browser. The true client
# IP rides in the `CF-Connecting-IP` header that Cloudflare sets. We tell nginx's
# realip module to trust that header from Cloudflare's published ranges (and the local
# tunnel hop) and rewrite $remote_addr to the real client. real_ip_recursive walks the
# chain past trusted hops. Refresh the IP lists from https://www.cloudflare.com/ips/.
real_ip_header CF-Connecting-IP;
real_ip_recursive on;
# Cloudflare IPv4 ranges:
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# Cloudflare IPv6 ranges:
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
# Local tunnel hop (cloudflared sits on the docker `frontend` network — trust the
# RFC1918 docker bridge so the recursive walk reaches CF-Connecting-IP).
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 10.0.0.0/8;

# Shared proxy headers for the battle-report upstream.
# After the realip rewrite above, $remote_addr == the real client IP.
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;

# ---- API: JSON + session + upload --------------------------------------------------
location /api/br {
    # Match BR_MAX_COMPRESSED (1 MiB). Keep these two in lock-step.
    client_max_body_size 1m;
    proxy_pass http://eve-spai-br:8090;
}

# ---- Server-rendered HTML: directory + viewer -------------------------------------
location /br {
    client_max_body_size 1m;
    proxy_pass http://eve-spai-br:8090;
}
