# Production deployment for the EVE Spai battle-report API server.
#
# Run from `crates/server` on the box:
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# The service joins two EXISTING (external) docker networks created by the host stack:
#   - frontend: nginx proxies to this container by DNS name `eve-spai-br`
#   - backend:  this container reaches Postgres `postgres-db-1` by DNS
# It is NOT host-published (no `ports:`) — only nginx talks to it, over `frontend`.
#
# Secrets come from deploy/.env (see .env.example). Non-secret, deploy-specific
# settings are pinned under `environment:` below.

services:
  eve-spai-br:
    # The container name == the DNS name nginx uses in proxy_pass.
    container_name: eve-spai-br
    build:
      # Context is the REPO ROOT (three levels up from this compose file:
      # deploy -> server -> crates -> repo root) so the Dockerfile can COPY the
      # repo-root Cargo.toml that br-core's workspace inheritance needs.
      context: ../../..
      dockerfile: crates/server/Dockerfile
    image: eve-spai-br:latest
    restart: unless-stopped

    # Secrets (DATABASE_URL, BR_SESSION_SECRET, optional cap overrides).
    env_file:
      - .env

    # Non-secret overrides. These win over .env for the same key; keep secrets OUT.
    environment:
      # Listen internally on :8090 (matches the nginx proxy_pass and EXPOSE).
      BIND_ADDR: "0.0.0.0:8090"
      # Canonical public origin used to build report URLs.
      PUBLIC_BASE_URL: "https://eve-spai.com"
      # Logging verbosity for the tracing EnvFilter.
      RUST_LOG: "info,eve_spai_br=info"
      # EVE_CLIENT_ID / EVE_JWKS_URL fall back to the in-binary defaults; override
      # here only if they ever change.

    networks:
      - frontend
      - backend

    # Liveness: the server answers GET /healthz with "ok". curl is in the runtime image.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# Both networks are owned by the host stack — we attach, never create them.
networks:
  frontend:
    external: true
  backend:
    external: true
