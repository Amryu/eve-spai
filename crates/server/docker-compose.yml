# Local Postgres for development and the gated DB integration tests.
#
#   docker compose up -d
#   export DATABASE_URL=postgres://evespai:evespai@localhost:5433/evespai
#   export BR_SESSION_SECRET=dev-only-change-me   # required: signs our session tokens
#   cargo test -- --ignored        # runs the DB-gated integration tests
#   cargo run                      # runs the server (migrations apply on startup)
#
# BR_SESSION_SECRET is required at startup. BR_SESSION_TTL_SECS (default 86400) sets
# how long an issued session token stays valid.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: evespai
      POSTGRES_PASSWORD: evespai
      POSTGRES_DB: evespai
    ports:
      - "5433:5432"
    volumes:
      - br_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evespai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  br_pgdata:
